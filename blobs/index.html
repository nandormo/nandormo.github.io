<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blob Website Generator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Blob Website Creator</h1>
        <p>Click the button below to generate a login page inside a <b>Blob URL</b>.</p>
        <button id="generateBtn">Launch Blob Site</button>
    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', () => {
            // The HTML/CSS/JS content for the "fake" login site
            const loginPageContent = `
<!DOCTYPE html>
<html>
<head>
    <title>Secure Login</title>
    <style>
        body { 
            background: #2c3e50; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 8px; 
            width: 300px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
        }
        h2 { color: #333; margin-top: 0; text-align: center; }
        input { 
            width: 100%; 
            padding: 10px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 10px; 
            background: #27ae60; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        button:hover { background: #219150; }
        .warning {
            font-size: 11px;
            color: #777;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Member Login</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button onclick="alert('Since this is a Blob, the data remains in memory!')">Sign In</button>
        <div class="warning">Notice: The URL above is a temporary memory reference.</div>
    </div>
</body>
</html>`;

            // 1. Create the Blob
            const blob = new Blob([loginPageContent], { type: 'text/html' });

            // 2. Create the Object URL
            const blobUrl = URL.createObjectURL(blob);

            // 3. Open the "website" in a new tab
            window.open(blobUrl, '_blank');
        });
    </script>
</body>
</html>
