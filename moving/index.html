<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Percent Ruler</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  html, body {
    height: 100%;
    margin: 0;
    background: #fff;
    font-family: sans-serif;
    overflow: hidden; /* prevents weird double-scrolling when keyboard opens */
  }

  .ruler {
    position: relative;
    height: 100%;
    width: 100%;
  }

  .tick {
    position: absolute;
    height: 1px;
    background: #0005;
  }

  .tick-left {
    left: 0;
    width: 5%;
  }

  .tick-right {
    right: 0;
    width: 5%;
  }

  .major {
    height: 3px;
    background: #000;
  }

  .label {
    position: absolute;
    font-size: 12px;
    color: #000;
    transform: translateY(-6px);
  }

  .label-left {
    left: 6%;
  }

  .label-right {
    right: 6%;
  }

  /* ===========================
     Chat-input-style bottom bar
     =========================== */

  .input-container {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0; /* base position */
    display: flex;
    justify-content: center;
    background: #fff;
    padding: 10px 0;
    border-top: 1px solid #ccc;
    transform: translateY(calc(-1 * var(--kb-offset, 0px)));
    transition: transform 0.08s ease-out;
  }

  .bottom-input {
    padding: 6px 10px;
    font-size: 16px;
    width: 60%;
    max-width: 300px;
  }
</style>
</head>

<body>

<div class="ruler" id="ruler"></div>

<!-- Bottom-center text field -->
<div class="input-container">
  <input class="bottom-input" type="text" placeholder="Type here…" />
</div>


<script>
  /* ===========================================
     RULER GENERATION
     =========================================== */
  const ruler = document.getElementById("ruler");

  function addTick(percent, isMajor = false, label = null) {
    const tickL = document.createElement("div");
    tickL.className = "tick tick-left" + (isMajor ? " major" : "");
    tickL.style.top = percent + "%";

    const tickR = document.createElement("div");
    tickR.className = "tick tick-right" + (isMajor ? " major" : "");
    tickR.style.top = percent + "%";

    ruler.appendChild(tickL);
    ruler.appendChild(tickR);

    if (label !== null) {
      const labelLeft = document.createElement("div");
      labelLeft.className = "label label-left";
      labelLeft.style.top = percent + "%";
      labelLeft.textContent = label;

      const labelRight = document.createElement("div");
      labelRight.className = "label label-right";
      labelRight.style.top = percent + "%";
      labelRight.textContent = label;

      ruler.appendChild(labelLeft);
      ruler.appendChild(labelRight);
    }
  }

  const majorTicks = new Set([10, 25, 50, 75, 90]);

  // 1% ticks from 1–10
  for (let i = 1; i <= 10; i++) {
    addTick(i, majorTicks.has(i));
  }

  // 10% ticks from 20–80
  for (let i = 20; i <= 80; i += 10) {
    addTick(i, majorTicks.has(i));
  }

  // 1% ticks from 90–99
  for (let i = 90; i <= 99; i++) {
    addTick(i, majorTicks.has(i));
  }

  // Add labels only on major ticks
  majorTicks.forEach(p => {
    addTick(p, true, p + "%");
  });


  /* ===========================================
     TELEGRAM-STYLE INPUT-BAR KEYBOARD HANDLING
     =========================================== */

  function updateKeyboardOffset() {
    if (!window.visualViewport) return;

    const vv = window.visualViewport;
    const keyboardHeight = window.innerHeight - vv.height - vv.offsetTop;

    document.documentElement.style.setProperty(
      "--kb-offset",
      keyboardHeight > 0 ? keyboardHeight + "px" : "0px"
    );
  }

  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", updateKeyboardOffset);
    window.visualViewport.addEventListener("scroll", updateKeyboardOffset);
    updateKeyboardOffset();
  }
</script>

</body>
</html>
